# Comprehensive evaluation configuration for G1 models

# Experiment metadata
experiment:
  name: "g1_evaluation"
  description: "Comprehensive evaluation of trained G1 models"
  tags: ["g1", "evaluation", "benchmark"]

# Model to evaluate
model:
  checkpoint_path: null  # Set via command line
  device: "auto"

# Environment configuration
env:
  name: "G1Evaluation"
  max_episode_steps: 2000  # Longer episodes for thorough evaluation
  frame_skip: 10
  observation_noise: 0.05
  action_noise: 0.01

  robot:
    model_path: "data/assets/unitree_g1.xml"
    init_noise: 0.1
    self_collision: true

# Evaluation scenarios
scenarios:
  # Base performance scenarios
  - name: "amass_walking"
    description: "AMASS walking motions"
    data_path: "data/processed/amass_retargeted/walking"
    episodes: 100
    metrics: ["tracking_error", "success_rate", "energy"]

  - name: "amass_running"
    description: "AMASS running motions"
    data_path: "data/processed/amass_retargeted/running"
    episodes: 50
    metrics: ["tracking_error", "success_rate", "energy"]

  - name: "dance_sequences"
    description: "Dance and complex motions"
    data_path: "data/processed/amass_retargeted/dance"
    episodes: 30
    metrics: ["tracking_error", "success_rate", "energy"]

  # Robustness scenarios
  - name: "mass_perturbation"
    description: "Variable mass distribution"
    base_scenario: "amass_walking"
    perturbations:
      mass_multiplier: [0.7, 1.3]
    episodes: 50
    metrics: ["tracking_error", "success_rate", "recovery_time"]

  - name: "friction_variation"
    description: "Different surface friction"
    base_scenario: "amass_walking"
    perturbations:
      friction_multiplier: [0.3, 2.0]
    episodes: 50
    metrics: ["tracking_error", "success_rate", "slip_detection"]

  - name: "external_pushes"
    description: "Random external forces"
    base_scenario: "amass_walking"
    perturbations:
      external_forces:
        max_force: [50, 100, 150]  # Newtons
        frequency: 0.2
    episodes: 100
    metrics: ["tracking_error", "recovery_time", "fall_rate"]

  - name: "sensor_degradation"
    description: "Degraded sensor performance"
    base_scenario: "amass_walking"
    perturbations:
      observation_noise: [0.1, 0.2, 0.3]
    episodes: 50
    metrics: ["tracking_error", "success_rate", "stability"]

  - name: "actuator_limitations"
    description: "Reduced actuator performance"
    base_scenario: "amass_walking"
    perturbations:
      actuator_strength: [0.7, 0.8, 0.9]
    episodes: 50
    metrics: ["tracking_error", "success_rate", "energy"]

# Metrics configuration
metrics:
  # Tracking metrics
  tracking_error:
    joint_position_error: "RMSE"
    joint_velocity_error: "RMSE"
    root_position_error: "RMSE"
    root_orientation_error: "angle_distance"

  # Performance metrics
  success_rate:
    completion_threshold: 0.9  # fraction of motion completed
    tracking_threshold: 0.1    # max allowable error

  # Robustness metrics
  recovery_time:
    perturbation_detection_threshold: 0.2
    recovery_threshold: 0.1
    max_recovery_time: 2.0  # seconds

  # Energy metrics
  energy:
    mechanical_power: true
    electrical_power: true
    efficiency: true

  # Stability metrics
  stability:
    zero_moment_point: true
    center_of_mass_tracking: true
    base_orientation_variance: true

# Analysis configuration
analysis:
  # Statistical analysis
  statistics:
    confidence_interval: 0.95
    significance_test: "t_test"
    multiple_comparison_correction: "bonferroni"

  # Visualization
  plots:
    - "trajectory_comparison"
    - "error_distribution"
    - "performance_vs_difficulty"
    - "energy_efficiency"
    - "robustness_radar"

  # Report generation
  report:
    format: ["html", "pdf", "json"]
    include_videos: true
    include_statistics: true
    include_plots: true

# Output configuration
output:
  base_dir: "results/evaluation"
  experiment_subdir: true  # Create subdirectory with timestamp
  save_trajectories: true
  save_videos: true
  save_metrics: true
  save_configs: true

# Reproducibility
seed: 12345
deterministic: true  # Use deterministic evaluation

# Parallel execution
parallel:
  enabled: true
  num_workers: 8
  scenarios_per_worker: 1