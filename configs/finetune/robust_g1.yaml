# Configuration for robustness fine-tuning with domain randomization

# Experiment metadata
experiment:
  name: "g1_finetune_robust"
  description: "Robustness fine-tuning for Unitree G1 with domain randomization"
  tags: ["g1", "finetune", "robust", "domain_rand"]

# Environment configuration
env:
  name: "G1RobustTraining"
  max_episode_steps: 1000
  frame_skip: 10
  observation_noise: [0.01, 0.1]  # min, max range
  action_noise: [0.005, 0.02]

  # Robot configuration with randomization
  robot:
    model_path: "data/assets/unitree_g1.xml"
    init_noise: [0.05, 0.2]
    self_collision: true

    # Domain randomization parameters
    mass_multiplier: [0.8, 1.2]
    friction_multiplier: [0.5, 1.5]
    damping_multiplier: [0.7, 1.3]
    actuator_strength: [0.9, 1.1]

  # Task configuration
  task:
    reference_data_path: "data/processed/amass_retargeted"
    motion_length: [5.0, 15.0]  # variable length
    early_termination: true
    termination_height: 0.3

    # Perturbations
    external_forces:
      enabled: true
      max_force: 100.0  # Newtons
      frequency: 0.1  # probability per step

  # Enhanced reward for robustness
  rewards:
    tracking_pos: 1.0
    tracking_vel: 0.1
    tracking_root: 2.0
    energy: -0.002
    alive: 0.2
    termination: -20.0
    stability: 0.5  # reward for stable poses
    recovery: 1.0   # reward for recovering from perturbations

# Model configuration (inherits from pretrained)
model:
  name: "TransformerPolicy"
  load_checkpoint: "logs/imitation/best_model.pt"
  freeze_encoder: false  # Allow full fine-tuning

  # Additional robustness modules
  adversarial_training:
    enabled: true
    epsilon: 0.1
    alpha: 0.01
    iterations: 5

# Training configuration
training:
  algorithm: "PPO"  # Reinforcement Learning
  total_steps: 5_000_000

  # PPO specific parameters
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  learning_rate: 1e-4
  clip_range: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  max_grad_norm: 0.5

  # GAE parameters
  gamma: 0.99
  gae_lambda: 0.95

  # Curriculum learning
  curriculum:
    enabled: true
    start_difficulty: 0.3
    end_difficulty: 1.0
    steps_to_full: 2_000_000

# Evaluation configuration
evaluation:
  eval_frequency: 200_000
  eval_episodes: 100

  # Robustness evaluation scenarios
  scenarios:
    - name: "nominal"
      description: "Standard conditions"
      perturbations: []

    - name: "mass_variation"
      description: "Variable mass distribution"
      perturbations: ["mass_random"]

    - name: "surface_variation"
      description: "Different surface properties"
      perturbations: ["friction_random"]

    - name: "external_forces"
      description: "External force perturbations"
      perturbations: ["force_random"]

    - name: "sensor_noise"
      description: "High sensor noise"
      perturbations: ["noise_high"]

  metrics:
    - "tracking_error"
    - "episode_length"
    - "success_rate"
    - "energy_consumption"
    - "recovery_time"
    - "stability_score"

# Logging configuration
logging:
  log_frequency: 2000
  save_frequency: 200_000
  max_checkpoints: 10

  # Video recording for robustness analysis
  record_video: true
  video_frequency: 500_000

  wandb:
    project: "unitree-g1-sonic"
    tags: ["finetune", "robust", "g1"]

# Reproducibility
seed: 1337
deterministic: false

# Hardware configuration
device: "auto"
compile_model: false