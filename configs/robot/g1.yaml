# Unitree G1 Robot Configuration
robot:
  name: "unitree_g1"
  dof: 22

  # Joint configuration
  joint_names:
    - "left_hip_yaw"
    - "left_hip_roll"
    - "left_hip_pitch"
    - "left_knee_pitch"
    - "left_ankle_pitch"
    - "left_ankle_roll"
    - "right_hip_yaw"
    - "right_hip_roll"
    - "right_hip_pitch"
    - "right_knee_pitch"
    - "right_ankle_pitch"
    - "right_ankle_roll"
    - "torso_yaw"
    - "left_shoulder_pitch"
    - "left_shoulder_roll"
    - "left_elbow_pitch"
    - "left_wrist_yaw"
    - "right_shoulder_pitch"
    - "right_shoulder_roll"
    - "right_elbow_pitch"
    - "right_wrist_yaw"
    - "head_yaw"

  # Joint limits (radians)
  joint_limits:
    position:
      min: [-2.0, -1.5, -2.0, -0.1, -1.0, -0.5, -2.0, -1.5, -2.0, -0.1, -1.0, -0.5,
            -3.14, -2.0, -1.5, -2.0, -3.14, -2.0, -1.5, -2.0, -3.14, -1.57]
      max: [2.0, 1.5, 2.0, 2.5, 1.0, 0.5, 2.0, 1.5, 2.0, 2.5, 1.0, 0.5,
            3.14, 2.0, 1.5, 2.0, 3.14, 2.0, 1.5, 2.0, 3.14, 1.57]
    velocity:
      max: [10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0,
            10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0]
    torque:
      max: [100.0, 100.0, 150.0, 120.0, 80.0, 40.0, 100.0, 100.0, 150.0, 120.0, 80.0, 40.0,
            60.0, 80.0, 60.0, 40.0, 20.0, 80.0, 60.0, 40.0, 20.0, 20.0]

  # Physical properties
  physics:
    mass: 35.0  # kg
    height: 1.3  # m
    com_height: 0.9  # m
    foot_length: 0.25  # m
    foot_width: 0.1   # m

  # Control properties
  control:
    frequency: 100  # Hz
    action_scale: 1.0
    action_type: "joint_torque"  # or "joint_position"

  # Observation configuration
  observation:
    include_velocity: true
    include_imu: true
    include_contact: true
    include_commands: true
    history_length: 1

  # Safety parameters
  safety:
    emergency_stop_threshold: 0.5  # seconds without command
    max_joint_vel: 15.0  # rad/s
    contact_threshold: 10.0  # N